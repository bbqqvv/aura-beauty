version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: shofy_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: shofy_minio
    ports:
      - "9005:9000"
      - "9006:9001"
    environment:
      MINIO_ROOT_USER: shofyadmin
      MINIO_ROOT_PASSWORD: shofypassword123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  mongo_data:
  minio_data:
