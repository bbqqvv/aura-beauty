version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: shofy_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: shofy_minio
    ports:
      - "9005:9000"
      - "9006:9001"
    environment:
      MINIO_ROOT_USER: shofyadmin
      MINIO_ROOT_PASSWORD: shofypassword123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./shofy-Jewelry-ecommerce-backend
      dockerfile: Dockerfile
    container_name: shofy_backend
    ports:
      - "7000:7000"
    environment:
      - PORT=7000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/shofy
      - STORE_URL=http://localhost:3000
      - ADMIN_URL=http://localhost:4000
      - TOKEN_SECRET=fbb2d60078ba3907a2eba275d2aeee5c6dd064c183b8a07013b56044c2156fbb1d0da15f2817a5f06bcc27a4c1b36027a2555b3997b4182f6d5a4c008be95d13
      - JWT_SECRET_FOR_VERIFY=724b07ce96f552b2d9405fb02899e199d14fdb874cf33634a3d233a649b8544a0a6ec9874c9d2f705bc983b478686d0808924b4fcd3166c752d492101c5c419d
      - SERVICE=gmail
      - EMAIL_USER=swe.hamedhasan@gmail.com
      - EMAIL_PASS=jrkzephmjtaznmgb
      - HOST=smtp.ethereal.email
      - EMAIL_PORT=465
      - CLOUDINARY_NAME=dm0ypib1h
      - CLOUDINARY_API_KEY=661879956728534
      - CLOUDINARY_API_SECRET=tFKyf-97GFE2KD7La9PVwDxxbF8
      - CLOUDINARY_UPLOAD_PRESET=profile-preset
      - STRIPE_KEY=sk_test_51NYXCFGndYsQkAEFepTcn2aWjSBdhUpGKhBzslhuUk7q3vCp3QVcNh6Sr7gpTdCzvpCSwJTw5zHH8r6QAV4cb4e900x3BoQZV7
    depends_on:
